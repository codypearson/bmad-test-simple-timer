<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Timer — Key Screen (idle, 5 min selected)</title>
  <!--
    Governs: DESIGN.md Components (timer-card, preset-button-selected, countdown-display, control-primary, control-secondary)
            EXPERIENCE.md IA (Timer surface), State Patterns (Preset selected idle), Voice and Tone
            Flow 1 steps 1–3 (Cody opens, 5 min selected, ready to start)
  -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FBF9F4;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 64px 24px;
    }

    .timer-card {
      background: #FFFFFF;
      border: 1px solid #E8E2D9;
      border-radius: 20px;
      padding: 48px;
      max-width: 480px;
      width: 100%;
    }

    .presets {
      display: flex;
      gap: 12px;
    }

    .preset {
      flex: 1;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      border: 1px solid #E8E2D9;
      background: #FFFFFF;
      color: #2C2825;
    }

    .preset.selected {
      background: #EDE4D8;
      border-color: #B8864E;
    }

    .display-zone {
      margin: 48px 0;
      text-align: center;
    }

    .countdown {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 96px;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      color: #2C2825;
    }

    .completion {
      margin-top: 16px;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      color: #B8864E;
      min-height: 28px;
      visibility: hidden;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn-primary {
      padding: 16px 32px;
      border-radius: 12px;
      border: none;
      background: #B8864E;
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-secondary {
      padding: 16px 32px;
      border-radius: 12px;
      border: 1px solid #E8E2D9;
      background: #FFFFFF;
      color: #2C2825;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }

    .annotation {
      margin-top: 32px;
      text-align: center;
      font-size: 13px;
      color: #7A7268;
    }
  </style>
</head>
<body>
  <div>
    <div class="timer-card" role="application" aria-label="Focus timer">
      <div class="presets" role="group" aria-label="Duration presets">
        <button class="preset" type="button" aria-pressed="false">1 min</button>
        <button class="preset selected" type="button" aria-pressed="true">5 min</button>
        <button class="preset" type="button" aria-pressed="false">10 min</button>
        <button class="preset" type="button" aria-pressed="false">25 min</button>
      </div>

      <div class="display-zone">
        <div class="countdown" aria-live="polite">05:00</div>
        <div class="completion" aria-hidden="true">Time's up!</div>
      </div>

      <div class="controls">
        <button class="btn-primary" type="button">Let's go</button>
        <button class="btn-secondary" type="button">Start over</button>
      </div>
    </div>
    <p class="annotation">Key screen — idle state, 5 min preset selected (canonical laptop viewport)</p>
  </div>
</body>
</html>
